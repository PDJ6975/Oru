# .swiftlint.yml - Oru

included:
  - Oru

excluded:
  - OruTests

strict: true

disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_first_not_nil
  - force_unwrapping
  - implicitly_unwrapped_optional
  - overridden_super_call
  - private_action
  - private_outlet
  - vertical_whitespace_closing_braces

line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 500

file_length:
  warning: 500
  error: 1000

identifier_name:
  min_length:
    warning: 2
  excluded:
    - id
    - i
    - x
    - y

reporter: xcode
